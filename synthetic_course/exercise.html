<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>测试习题页</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      background: #edf2f7;
      color: #162235;
    }
    .shell {
      max-width: 880px;
      margin: 40px auto;
      padding: 28px;
      background: #fff;
      border: 1px solid #d7dee9;
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(29, 49, 74, 0.08);
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .btn-next {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #2c5cc8;
      color: #fff;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }
    .submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
      padding: 10px 16px;
      border-radius: 12px;
      background: #eef3f9;
      color: #234c91;
      border: 1px solid #d5deea;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header-bar">
      <div>
        <div>习题</div>
        <div>提交</div>
      </div>
      <span class="btn-next ml20 pointer" id="next-unit">下一单元</span>
    </div>
    <div class="submit">提交</div>
  </div>

  <script>
    document.getElementById("next-unit").addEventListener("click", () => {
      window.location.href = "./done.html";
    });
  </script>
</body>
</html>
